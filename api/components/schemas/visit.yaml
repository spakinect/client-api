VisitData:
  type: object
  required:
    - gfe_id
    - status
    - requested_treatments
    - patient_details
  properties:
    gfe_id:
      type: string
      description: Unique identifier for the GFE visit
      example: gfe_abc123xyz789
    status:
      type: string
      description: Current status of the visit
      enum:
        - Processing
        - Pending Review
        - Approved
        - Completed
        - Cancelled
        - Rejected
      example: Processing
    requested_treatments:
      type: array
      description: List of treatments requested for this visit
      items:
        type: string
      example:
        - Botox Injection
        - Dermal Filler
    patient_details:
      $ref: ./patient.yaml#/VisitPatientDetails
    approved_treatments:
      type: array
      description: Present only when status is Completed. Names of treatments approved.
      items:
        type: string
      example:
        - Botox Injection
    conditionally_approved_treatments:
      type: array
      description: >
        Present only when status is Completed. Names of treatments approved with
        conditions.
      items:
        type: string
      example:
        - Dermal Filler
    deferred_treatments:
      type: array
      description: Present only when status is Completed. Names of treatments deferred.
      items:
        type: string
      example: []
    pdf_link:
      type: string
      description: >
        Signed URL to download the GFE PDF. Present when a PDF is available.
        URL expires after a short period; request a new one via the API if needed.
  additionalProperties: false

VisitStatusResponse:
  type: object
  required:
    - success
    - data
  properties:
    success:
      type: boolean
      description: Indicates if the request was processed successfully
      example: true
    data:
      $ref: "#/VisitData"
  additionalProperties: false

CompletedGFEsResponse:
  type: object
  required:
    - success
    - count
    - gfes
  properties:
    success:
      type: boolean
      description: Indicates if the request was processed successfully
      example: true
    count:
      type: integer
      description: Number of completed GFEs returned
      example: 2
    gfes:
      type: array
      description: List of completed GFE visit data
      items:
        $ref: "#/VisitData"
  additionalProperties: false
